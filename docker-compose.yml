# Full local/production stack: MongoDB + Go API + static web.
# Local dev still runs without this (Go + `npm run dev` + your local Mongo).
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  api:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: raphbet
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      - mongo

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  mongo-data:
