<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FF6B35" />

    <!-- Primary SEO -->
    <title>Raphbet — Bet on the FIFA World Cup with Crypto</title>
    <meta name="description" content="Raphbet is a fast, simple crypto sportsbook for the FIFA World Cup. Live odds, accumulators with win boosts, instant crypto deposits and withdrawals. 18+." />
    <meta name="keywords" content="Raphbet, World Cup betting, crypto betting, football odds, sports betting, accumulator, acca boost, USDT betting, Bitcoin betting" />
    <meta name="author" content="Raphbet" />
    <meta name="robots" content="index, follow" />
    <!-- Update to your live domain after deploy (Vercel/custom). -->
    <link rel="canonical" href="https://raphbet.com/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Raphbet" />
    <meta property="og:title" content="Raphbet — Bet on the FIFA World Cup with Crypto" />
    <meta property="og:description" content="A clean, simple crypto sportsbook for the FIFA World Cup. Live odds, accumulator boosts, instant crypto deposits & withdrawals. 18+." />
    <meta property="og:url" content="https://raphbet.com/" />
    <meta property="og:image" content="https://raphbet.com/og-image.png" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Raphbet — Bet on the FIFA World Cup with Crypto" />
    <meta name="twitter:description" content="A clean, simple crypto sportsbook for the FIFA World Cup. Live odds, accumulator boosts, instant crypto deposits & withdrawals. 18+." />
    <meta name="twitter:image" content="https://raphbet.com/og-image.png" />

    <!-- Structured data: tells Google what the site is -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Raphbet",
      "url": "https://raphbet.com/",
      "description": "A clean, simple crypto sportsbook for the FIFA World Cup.",
      "inLanguage": "en"
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              primary: '#FF6B35',
              'primary-dark': '#E85A2A',
              accent: '#FFA726',
              success: '#16A34A',
              danger: '#DC2626',
              live: '#E11D48',
              neutral: {
                light: '#FFFFFF',
                dark: '#0F1115',
                'gray': '#4a4a4a',
                'light-gray': '#f3f4f6',
                'dark-gray': '#181B21',
                'dark-card': '#1E222B',
                'border': '#2A2F3A'
              },
            },
            keyframes: {
              'fade-in': { '0%': { opacity: 0, transform: 'translateY(4px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
            },
            animation: {
              'fade-in': 'fade-in 0.2s ease-out',
            },
          },
        },
      }
    </script>
  </head>
  <body class="bg-neutral-light-gray dark:bg-neutral-dark">
    <div id="root">
      <!-- Lightweight pre-hydration splash so users never see a blank page -->
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif">
        <div style="display:flex;flex-direction:column;align-items:center;gap:12px;color:#FF6B35">
          <div style="width:42px;height:42px;border:4px solid #FF6B35;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite"></div>
          <span style="font-weight:700;letter-spacing:.5px">RAPHBET</span>
        </div>
      </div>
    </div>
    <style>
      @keyframes spin{to{transform:rotate(360deg)}}
      /* Custom scrollbars (light + dark) */
      * { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
      .dark * { scrollbar-color: #3a4150 transparent; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; border: 2px solid transparent; background-clip: content-box; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; background-clip: content-box; }
      .dark ::-webkit-scrollbar-thumb { background: #3a4150; background-clip: content-box; }
      .dark ::-webkit-scrollbar-thumb:hover { background: #4b5563; background-clip: content-box; }
    </style>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
